# yaml-language-server: $schema=../schemas/config.schema.json

scan:
  include:
    - "docs/**"
    - "README.md"
    - "AGENTS.md"
    - ".skeleton/registry.md"
    - "skeleton/**"
  exclude:
    - "refs/**"
    - "todo.md"
    - "agent-suites/**"
    # Local skills-CLI install trees (not source) — avoid dual-SKILL dogfood fails
    - ".agents/**"
    - ".claude/**"
  banned: []
  retiredSkills: []

daysUntilStale: 180
