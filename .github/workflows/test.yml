name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.21"

      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build
      - run: node dist/cli.js audit self
      - run: npm run validate:ci
