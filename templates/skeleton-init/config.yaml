# yaml-language-server: $schema=node_modules/@csark0812/skeleton/schemas/config.schema.json

scan:
  include:
    - "docs/**"
    - "README.md"
    - ".skeleton/registry.md"
    - "AGENTS.md"
  exclude:
    - "refs/**"
  banned: []
  retiredSkills: []

daysUntilStale: 180

